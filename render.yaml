services:
  # PostgreSQL Database
  - type: pspg
    name: scripty-database
    plan: starter
    databaseName: scripty_prod
    user: scripty_user

  # Backend Python service - API SaaS Scripty
  - type: web
    name: scripty-backend
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -c gunicorn.conf.py app_saas:app
    healthCheckPath: /health
    envVars:
      # Database (utilise la base de données créée ci-dessus)
      - key: DATABASE_URL
        fromDatabase:
          name: scripty-database
          property: connectionString
      # Security
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Frontend URL
      - key: FRONTEND_URL
        value: https://scripty-frontend.onrender.com
      # AI APIs (à configurer dans le dashboard Render)
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_MODEL
        value: gpt-4o
      - key: CLAUDE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Flutterwave Mobile Money (à configurer dans le dashboard Render)
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_PUBLIC_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false
      # LTX-2 worker (GPU service URL — Scripty queues jobs here after script generation)
      - key: LTX_RUNNER_URL
        sync: false
      - key: LTX_RUNNER_TOKEN
        sync: false
      # Port
      - key: PORT
        value: 10000

  # Frontend React service - Interface utilisateur
  - type: web
    name: scripty-frontend
    env: node
    region: frankfurt
    plan: starter
    buildCommand: cd youtube-script-interface && npm ci --no-audit --no-fund && npm run build
    startCommand: cd youtube-script-interface && npm run start
    staticPublishPath: ./youtube-script-interface/build
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://scripty-backend.onrender.com
